apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault-e2e-test
data:
  vault.hcl: |
    ui = true
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = 1
    }
    storage "file" {
      path = "/vault/data"
    }
    api_addr = "http://localhost:8200"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault-e2e-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      containers:
      - name: vault
        image: hashicorp/vault:1.15.0
        args:
        - server
        - -dev
        - -dev-root-token-id=root
        ports:
        - containerPort: 8200
          name: http
        - containerPort: 8201
          name: cluster
        env:
        - name: VAULT_DEV_LISTEN_ADDRESS
          value: "0.0.0.0:8200"
        - name: VAULT_DEV_ROOT_TOKEN_ID
          value: "root"
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
        livenessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault-e2e-test
spec:
  type: ClusterIP
  selector:
    app: vault
  ports:
  - name: http
    protocol: TCP
    port: 8200
    targetPort: http
  - name: cluster
    protocol: TCP
    port: 8201
    targetPort: cluster

---
# Root token stored as a secret for sidecars that need VAULT_TOKEN
apiVersion: v1
kind: Secret
metadata:
  name: vault-root-token
  namespace: vault-e2e-test
type: Opaque
data:
  # base64("root")
  token: cm9vdA==
