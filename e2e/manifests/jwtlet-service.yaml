apiVersion: v1
kind: Service
metadata:
  name: jwtlet
  namespace: vault-e2e-test
spec:
  type: ClusterIP
  selector:
    app: jwtlet
  ports:
  - name: token-exchange
    protocol: TCP
    port: 8080
    targetPort: token-exchange
  - name: management
    protocol: TCP
    port: 8081
    targetPort: management
